<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GILCRIS LOGIN // ACT17</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #00ff41; /* Neon Matrix Green */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }
        .login-container {
            border: 2px solid #00ff41;
            padding: 30px;
            box-shadow: 0 0 15px #00ff41;
            background: rgba(0, 0, 0, 0.9);
            width: 350px;
        }
        h2 { text-align: center; border-bottom: 1px solid #00ff41; padding-bottom: 10px; }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #000;
            border: 1px solid #00ff41;
            color: #00ff41;
            box-sizing: border-box;
            outline: none;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #00ff41;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover { background: #008f11; box-shadow: 0 0 10px #00ff41; }
        
        /* FIX PARA SA ALIGNMENT NG LINKS */
        .links-container { 
            margin-top: 20px; 
            font-size: 0.8em; 
            text-align: center; 
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        a { color: #00ff41; text-decoration: none; border-bottom: 1px dotted #00ff41; }
        a:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>System Login</h2>
        <form id="loginForm">
            <label>Email_Address:</label>
            <input type="email" id="email" required placeholder="user@domain.com">
            
            <label>Access_Code:</label>
            <input type="password" id="password" required placeholder="********">
            
            <button type="submit">EXECUTE_LOGIN</button>
        </form>

        <div class="links-container">
            <a href="forgot-password.html" style="border-bottom: 1px dashed #00ff41;">
                FORGOT_ACCESS_KEY?
            </a>

            <div>
                <span style="opacity: 0.7;">No account? </span>
                <a href="register.html">Initial_Registration</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('http://localhost:5000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                
                if (res.ok) {
                    alert('ACCESS GRANTED!');
                    
                    // 1. I-save ang token sa browser
                    localStorage.setItem('token', data.token); 
                    
                    // 2. Redirect sa profile page
                    window.location.href = 'profile.html'; 
                    
                } else {
                    alert('ACCESS DENIED: ' + data.message);
                }
            } catch (error) {
                alert('SERVER ERROR: Make sure your backend is running.');
            }
        });
    </script>
</body>
</html>
