<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GILCRIS // FORGOT_PASSWORD</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; text-transform: uppercase; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .reset-card { border: 2px solid #00ff41; padding: 30px; width: 350px; box-shadow: 0 0 15px #00ff41; text-align: center; }
        input { background: #1a1a1a; border: 1px solid #00ff41; color: #00ff41; padding: 10px; width: 90%; margin: 15px 0; outline: none; }
        button { background: #00ff41; color: #000; border: none; padding: 12px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #00cc33; box-shadow: 0 0 10px #00ff41; }
        a { color: #00ff41; text-decoration: none; font-size: 12px; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="reset-card">
        <h2>RECOVER_ACCESS</h2>
        <p style="font-size: 10px;">ENTER REGISTERED EMAIL</p>
        <input type="email" id="emailInput" placeholder="USER@NMSC.EDU.PH">
        <button onclick="sendResetLink()">SEND_RESET_LINK</button>
        <a href="login.html">RETURN_TO_LOGIN</a>
    </div>

    <script>
        async function sendResetLink() {
            const email = document.getElementById('emailInput').value;
            if(!email) return alert("Email required!");

            try {
                const res = await fetch('http://localhost:5000/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                alert(data.message);
            } catch (err) {
                alert("Server Error!");
            }
        }
    </script>
</body>
</html>
