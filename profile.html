<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GILCRIS // USER_PROFILE</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; text-transform: uppercase; padding: 50px; }
        .profile-card { border: 2px solid #00ff41; padding: 20px; width: 400px; margin: auto; box-shadow: 0 0 15px #00ff41; text-align: center; }
        .avatar { width: 150px; height: 150px; border: 1px solid #00ff41; margin-bottom: 20px; object-fit: cover; background: #1a1a1a; }
        input[type="file"] { margin: 10px 0; color: #00ff41; font-size: 12px; }
        button { background: #00ff41; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button:hover { background: #00cc33; }
        .logout { margin-top: 20px; background: #ff0000; color: #fff; }
        .info { text-align: left; margin-bottom: 20px; border-bottom: 1px solid #00ff41; padding-bottom: 10px; }
    </style>
</head>
<body>
    <div class="profile-card">
        <h2>USER_PROFILE_STATUS</h2>
        
        <img id="profilePic" src="https://via.placeholder.com/150" class="avatar" alt="PROFILE">
        
        <div class="info">
            <p>ID: <span id="userId">---</span></p>
            <p>USER: <span id="username">---</span></p>
        </div>
        
        <h3>UPDATE_AVATAR</h3>
        <input type="file" id="fileInput" accept="image/*">
        <button onclick="uploadImage()">UPLOAD_IMAGE</button>
        
        <button class="logout" onclick="logout()">TERMINATE_SESSION (LOGOUT)</button>
    </div>

    <script>
        // 1. Check for Token
        const token = localStorage.getItem('token');
        if (!token) { 
            window.location.href = 'login.html'; 
        }

        // 2. Decode Token and Setup User
        const user = JSON.parse(atob(token.split('.')[1]));
        document.getElementById('username').innerText = user.username;
        document.getElementById('userId').innerText = user.id;

        // 3. Upload Function with Anti-Spam
        async function uploadImage() {
            const fileInput = document.getElementById('fileInput');
            const uploadBtn = document.querySelector("button[onclick='uploadImage()']");
            
            if (!fileInput.files[0]) return alert('Pili muna ng file, hacker!');

            // Anti-Spam: I-disable ang button
            uploadBtn.disabled = true;
            uploadBtn.innerText = "UPLOADING_BYPASS...";

            const formData = new FormData();
            formData.append('profile_pic', fileInput.files[0]);
            formData.append('userId', user.id);

            try {
                const res = await fetch('http://localhost:5000/api/upload-profile', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });

                const data = await res.json();
                
                if (res.ok) {
                    alert('ACCESS GRANTED: Avatar Updated!');
                    // I-update ang picture
                    document.getElementById('profilePic').src = `http://localhost:5000/Uploads/${data.filename}`;
                } else {
                    alert('ERROR: ' + data.message);
                }
            } catch (err) {
                console.error(err);
                alert('CRITICAL ERROR: Server unreachable!');
            } finally {
                // I-enable ulit ang button pagkatapos ng process
                uploadBtn.disabled = false;
                uploadBtn.innerText = "UPLOAD_IMAGE";
            }
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
